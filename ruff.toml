# Ruff config for the SermonSync Python sidecar.
# https://docs.astral.sh/ruff/
target-version = "py39"
line-length = 100

[lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade,
# B: flake8-bugbear, C4: comprehensions, SIM: simplify.
select = ["E", "W", "F", "I", "UP", "B", "C4", "SIM"]

[format]
quote-style = "double"
