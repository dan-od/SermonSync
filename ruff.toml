# Ruff config for the SermonSync Python sidecar.
# https://docs.astral.sh/ruff/
target-version = "py39"
line-length = 100

[lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade,
# B: flake8-bugbear, C4: comprehensions, SIM: simplify.
select = ["E", "W", "F", "I", "UP", "B", "C4", "SIM"]
# The sidecar runs on Python 3.9 where Pydantic/FastAPI evaluate annotations at
# runtime — PEP 604 `X | None` / `Union[...]` aren't safe there, so keep
# typing.Optional / typing.Union in those models.
ignore = ["UP007", "UP045"]

[format]
quote-style = "double"
